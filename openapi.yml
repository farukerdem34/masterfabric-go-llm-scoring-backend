openapi: 3.0.3
info:
  title: MasterFabric Go API
  description: >
    Enterprise-grade, multi-tenant, RBAC-driven SaaS backend platform.
    Domain-driven design with bounded contexts: IAM, Tenant, API Management, Audit, Realtime.
  version: 0.0.1
  contact:
    name: MasterFabric
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Liveness and readiness probes
  - name: Auth
    description: User registration, login, token refresh, logout, sessions
  - name: Users
    description: User management and role assignment
  - name: Organizations
    description: Multi-tenant organization management
  - name: Apps
    description: Application management within organizations
  - name: API Keys
    description: API key lifecycle management
  - name: Endpoints
    description: API endpoint definition and gateway management
  - name: Workspaces
    description: Workspace management within organizations
  - name: Audit
    description: Audit log queries
  - name: Realtime
    description: WebSocket real-time connection

paths:
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      description: Returns 200 if the server is alive.
      operationId: healthLiveness
      responses:
        "200":
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: alive

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      description: Checks database and cache connectivity.
      operationId: healthReadiness
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more services unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and receive JWT + refresh token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                description: "refresh_token HttpOnly cookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponseV2"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using refresh token cookie
      operationId: refreshToken
      responses:
        "200":
          description: Token refreshed
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      security:
        - bearerAuth: []
      operationId: logout
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all sessions
      security:
        - bearerAuth: []
      operationId: logoutAll
      responses:
        "204":
          description: All sessions logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions
      security:
        - bearerAuth: []
      operationId: listSessions
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me:
    get:
      tags: [Users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      operationId: getMe
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/users:
    get:
      tags: [Users]
      summary: List all users
      security:
        - bearerAuth: []
      operationId: listUsers
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Get a user by ID
      security:
        - bearerAuth: []
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/roles/assign:
    post:
      tags: [Users]
      summary: Assign a role to a user
      security:
        - bearerAuth: []
      operationId: assignRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "204":
          description: Role assigned
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/organizations:
    post:
      tags: [Organizations]
      summary: Create an organization
      security:
        - bearerAuth: []
      operationId: createOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgRequest"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    get:
      tags: [Organizations]
      summary: List organizations
      security:
        - bearerAuth: []
      operationId: listOrgs
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Organization list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/organizations/{orgId}:
    get:
      tags: [Organizations]
      summary: Get an organization by ID
      security:
        - bearerAuth: []
      operationId: getOrg
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/organizations/{orgId}/apps:
    post:
      tags: [Apps]
      summary: Create an app within an organization
      security:
        - bearerAuth: []
      operationId: createApp
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppRequest"
      responses:
        "201":
          description: App created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    get:
      tags: [Apps]
      summary: List apps in an organization
      security:
        - bearerAuth: []
      operationId: listApps
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: App list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/organizations/{orgId}/apps/{appId}:
    get:
      tags: [Apps]
      summary: Get an app by ID
      security:
        - bearerAuth: []
      operationId: getApp
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: App details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/organizations/{orgId}/apps/{appId}/keys:
    post:
      tags: [API Keys]
      summary: Create an API key for an app
      security:
        - bearerAuth: []
      operationId: createAPIKey
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created (raw key returned only once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    get:
      tags: [API Keys]
      summary: List API keys for an app
      security:
        - bearerAuth: []
      operationId: listAPIKeys
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/organizations/{orgId}/apps/{appId}/keys/{keyId}:
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      security:
        - bearerAuth: []
      operationId: revokeAPIKey
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
        - name: keyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: API key revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/organizations/{orgId}/apps/{appId}/endpoints:
    post:
      tags: [Endpoints]
      summary: Define a new API endpoint
      security:
        - bearerAuth: []
      operationId: defineEndpoint
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DefineEndpointRequest"
      responses:
        "201":
          description: Endpoint defined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    get:
      tags: [Endpoints]
      summary: List endpoints for an app
      security:
        - bearerAuth: []
      operationId: listEndpoints
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Endpoint list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EndpointInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/organizations/{orgId}/apps/{appId}/endpoints/{endpointId}:
    get:
      tags: [Endpoints]
      summary: Get an endpoint by ID
      security:
        - bearerAuth: []
      operationId: getEndpoint
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/EndpointId"
      responses:
        "200":
          description: Endpoint details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/organizations/{orgId}/apps/{appId}/endpoints/{endpointId}/retire:
    post:
      tags: [Endpoints]
      summary: Retire an endpoint
      security:
        - bearerAuth: []
      operationId: retireEndpoint
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/EndpointId"
      responses:
        "204":
          description: Endpoint retired
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/organizations/{orgId}/apps/{appId}/endpoints/{endpointId}/activate:
    post:
      tags: [Endpoints]
      summary: Activate an endpoint
      security:
        - bearerAuth: []
      operationId: activateEndpoint
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/EndpointId"
      responses:
        "204":
          description: Endpoint activated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/organizations/{orgId}/apps/{appId}/endpoints/{endpointId}/policy:
    get:
      tags: [Endpoints]
      summary: Get endpoint policy
      security:
        - bearerAuth: []
      operationId: getEndpointPolicy
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/EndpointId"
      responses:
        "200":
          description: Policy details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Endpoints]
      summary: Update endpoint policy
      security:
        - bearerAuth: []
      operationId: updateEndpointPolicy
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/AppId"
        - $ref: "#/components/parameters/EndpointId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyRequest"
      responses:
        "200":
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/organizations/{orgId}/workspaces:
    post:
      tags: [Workspaces]
      summary: Create a workspace
      security:
        - bearerAuth: []
      operationId: createWorkspace
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    get:
      tags: [Workspaces]
      summary: List workspaces in an organization
      security:
        - bearerAuth: []
      operationId: listWorkspaces
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/organizations/{orgId}/workspaces/{workspaceId}:
    put:
      tags: [Workspaces]
      summary: Update a workspace
      security:
        - bearerAuth: []
      operationId: updateWorkspace
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/organizations/{orgId}/audit-logs:
    get:
      tags: [Audit]
      summary: List audit logs for an organization
      security:
        - bearerAuth: []
      operationId: listAuditLogsByOrg
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/users/{userId}/audit-logs:
    get:
      tags: [Audit]
      summary: List audit logs for a user
      security:
        - bearerAuth: []
      operationId: listAuditLogsByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/ws:
    get:
      tags: [Realtime]
      summary: WebSocket connection for real-time updates
      security:
        - bearerAuth: []
      operationId: wsConnect
      responses:
        "101":
          description: WebSocket upgrade successful

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /api/v1/auth/login or /api/v1/auth/refresh

  parameters:
    OrgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Organization ID
    AppId:
      name: appId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: App ID
    EndpointId:
      name: endpointId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Endpoint ID
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Pagination offset
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Pagination limit

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponseV2:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Token TTL in seconds
        user:
          $ref: "#/components/schemas/UserInfo"

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer

    UserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]
        created_at:
          type: string
          format: date-time

    AssignRoleRequest:
      type: object
      required: [user_id, role_id, organization_id]
      properties:
        user_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        app_id:
          type: string
          format: uuid
          nullable: true

    SessionInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        ip_address:
          type: string
        user_agent:
          type: string

    SessionsResponse:
      type: object
      properties:
